services:
  postgres:
    image: postgres:16
    container_name: postgres_credit_api
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: credit_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credit_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: fastapi_credit_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/credit_api

      # Modèle
      MODEL_NAME: credit_scoring_model
      MODEL_VERSION: v1
      MODEL_BACKEND: sklearn
      MODEL_PATH: /app/artifacts/model.joblib
      ONNX_MODEL_PATH: /app/artifacts/model.onnx
      THRESHOLD_PATH: /app/artifacts/threshold.json

      # Données
      APPLICATION_CSV: /app/data/application_train.csv
      SIMULATION_SOURCE_CSV: /app/data/application_test.csv
      DATA_PATH: /app/data

      # Monitoring
      MONITORING_DIR: /app/artifacts/monitoring

      # Hugging Face
      DOWNLOAD_ASSETS_FROM_HF: "true"
      HF_REPO_ID: ${HF_REPO_ID}
      HF_REPO_TYPE: ${HF_REPO_TYPE:-dataset}
      HF_TOKEN: ${HF_TOKEN}

      # Python
      PYTHONPATH: /app

    command:
      [
        "uv", "run", "uvicorn",
        "app.main:app",
        "--host", "0.0.0.0",
        "--port", "8000"
      ]

    ports:
      - "8000:8000"

    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./app:/app/app

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/predict/health')\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  dashboard:
    build: .
    container_name: streamlit_credit_dashboard
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/credit_api

      # Dashboard vers API Docker interne
      API_URL: http://api:8000
      API_KEY: ${API_KEY}
      DEFAULT_LIMIT: 200

      # Contexte modèle affiché côté dashboard
      MODEL_NAME: credit_scoring_model
      MODEL_VERSION: v1

      # Données locales partagées
      DATA_PATH: /app/data
      MONITORING_DIR: /app/artifacts/monitoring

      # Python
      PYTHONPATH: /app

    command:
      [
        "uv", "run", "streamlit", "run",
        "dashboard/dashboard_main.py",
        "--server.address=0.0.0.0",
        "--server.port=8501"
      ]

    ports:
      - "8501:8501"

    volumes:
      - ./dashboard:/app/dashboard
      - ./artifacts:/app/artifacts
      - ./app:/app/app
      - ./data:/app/data

volumes:
  postgres_data: