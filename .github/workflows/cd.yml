name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    name: build-and-push-ghcr
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests before publish
        run: uv run pytest -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/credit-scoring-api
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-huggingface:
    name: deploy-to-huggingface-space
    runs-on: ubuntu-latest
    needs: docker
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://SteGONZALEZ:${HF_TOKEN}@huggingface.co/spaces/SteGONZALEZ/pret_a_depenser hf-space

      - name: Prepare files for Hugging Face
        run: |
          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude "__pycache__" \
            --exclude ".pytest_cache" \
            --exclude ".mypy_cache" \
            --exclude ".ruff_cache" \
            --exclude "mlflow_backend" \
            --exclude "mlflow_artifacts" \
            --exclude "notebook" \
            --exclude "tests" \
            --exclude "docs/images" \
            --exclude "logs" \
            --exclude "submissions" \
            --exclude "*.png" \
            --exclude "*.jpg" \
            --exclude "*.jpeg" \
            --exclude "*.pyc" \
            ./ hf-space/

      - name: Ensure Hugging Face README metadata
        run: |
          cat > hf-space/README.md <<'EOF'
          ---
          title: Pret A Depenser API
          emoji: 🧠
          colorFrom: green
          colorTo: blue
          sdk: docker
          app_port: 7860
          ---

          # API FastAPI de scoring crédit
          EOF

      - name: Ensure Hugging Face Dockerfile
        run: |
          cat > hf-space/Dockerfile <<'EOF'
          FROM python:3.12-slim

          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PYTHONUNBUFFERED=1

          WORKDIR /app

          RUN apt-get update && apt-get install -y --no-install-recommends \
              build-essential \
              git \
              && rm -rf /var/lib/apt/lists/*

          COPY pyproject.toml uv.lock ./

          RUN pip install --no-cache-dir uv
          RUN uv sync --frozen --no-dev

          COPY . .

          EXPOSE 7860

          CMD ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "7860"]
          EOF

      - name: Push to Hugging Face Space
        run: |
          cd hf-space
          git add .
          git commit -m "Deploy from GitHub Actions" || echo "No changes to deploy"
          git push