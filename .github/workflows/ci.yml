name: CI

on:
  push:
    branches: ["main", "dev", "master"]
  pull_request:
    branches: ["main", "dev", "master"]
  workflow_dispatch:

jobs:
  ci:
    name: tests-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    env:
      ASSETS_SOURCE: huggingface
      HF_REPO_ID: SteGONZALEZ/pret-a-depenser-artifacts
      HF_ASSETS_REPO_ID: SteGONZALEZ/pret-a-depenser-artifacts
      HF_REPO_TYPE: dataset
      DATABASE_URL: sqlite:///./test_credit_api.db
      MODEL_BACKEND: onnx
      API_KEY: test_api_key
      BENCHMARK_MODE: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest -v

      - name: Build Docker image
        run: docker build -t credit-scoring-api:test .